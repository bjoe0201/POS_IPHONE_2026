name: POS_IPHONE_2026
options:
  bundleIdPrefix: b2p.idv.tw
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.24.1"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.0"

targets:
  POS:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: POS
        excludes:
          - "ThirdParty/XYSDK/**"
    dependencies:
      - package: GRDB
        product: GRDB
      - package: ZIPFoundation
        product: ZIPFoundation
      # 芯烨 XP-Q90EC 熱感印表機靜態庫（Objective-C），僅用 BLE + 文字模式
      - framework: POS/ThirdParty/XYSDK/XYSDK.a
        embed: false
      # XYSDK 文件指定需連結的系統框架
      - sdk: CoreBluetooth.framework
      - sdk: SystemConfiguration.framework
      - sdk: CFNetwork.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: b2p.idv.tw.pos
        PRODUCT_NAME: 火鍋POS
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_VERSION: "5.7"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        # Objective-C 橋接：讓 Swift 呼叫 XYSDK
        SWIFT_OBJC_BRIDGING_HEADER: POS/ThirdParty/Bridge/POS-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/POS/ThirdParty/XYSDK/include/XYSDK"
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/POS/ThirdParty/XYSDK"
        # 靜態庫含 Objective-C category，需 -ObjC 才能正確載入類別
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-ObjC"
        # 藍牙權限說明（連線熱感印表機列印收據）
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "需要藍牙以連線熱感印表機列印收據與報表。"
        INFOPLIST_KEY_NSBluetoothPeripheralUsageDescription: "需要藍牙以連線熱感印表機列印收據與報表。"
        INFOPLIST_KEY_CFBundleDisplayName: 火鍋POS
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

# 共用 scheme（讓 Xcode Cloud / xcodebuild 找得到 "POS"）
schemes:
  POS:
    build:
      targets:
        POS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
